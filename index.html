<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Convertidor Euro - Bolívares | EstamosFrito.com</title>
  <!-- Meta description for SEO -->
  <meta name="description" content="Convertidor de Euro a Bolívares y viceversa con envío directo a WhatsApp. Página profesional, colorida y accesible." />
  <!-- Google Fonts for vibrant look -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* Reset & base */
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffdd00, #ff6600);
      color: #222;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 1rem 1.5rem;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header p {
      margin: 0.25rem 0;
      font-weight: 600;
      color: #cc3300;
    }
    main {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }
    form {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.25);
      padding: 2rem 2.5rem;
      max-width: 420px;
      width: 100%;
    }
    /* Currency selector container */
    .currency-selector {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.5rem;
    }
    /* Radio styles hidden but accessible */
    .currency-selector input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    /* Label styling for currency options */
    .currency-label {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      padding: 0.5rem 1rem;
      border: 2px solid transparent;
      border-radius: 10px;
      transition: border-color 0.3s ease, background-color 0.3s ease;
      user-select: none;
      width: 120px;
      background-color: #f9f9f9;
    }
    .currency-label svg {
      width: 48px;
      height: 48px;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
    }
    .currency-selector input[type="radio"]:checked + .currency-label {
      border-color: #ff6600;
      background-color: #ffe066;
      font-weight: 700;
    }
    /* Separator lines */
    .currency-label::before,
    .currency-label::after {
      content: '';
      position: absolute;
      width: 35px;
      height: 3px;
      background-color: #ff6600;
      top: 50%;
      left: -45px;
      transform: translateY(-50%);
      border-radius: 2px;
      opacity: 0.7;
    }
    /* Only add lines between the two options */
    .currency-selector label:first-child::before {
      display: none;
    }
    .currency-selector label:last-child::after {
      display: none;
    }
    /* Inputs container */
    .inputs-group {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    label {
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #cc3300;
    }
    input[type="number"] {
      padding: 0.6rem 0.9rem;
      font-size: 1.1rem;
      border: 2px solid #ff6600;
      border-radius: 8px;
      transition: border-color 0.3s ease;
      outline-offset: 2px;
    }
    input[type="number"]:focus {
      border-color: #cc3300;
      outline: none;
       box-shadow: 0  0  6px #cc3300aa;
    }
    /* Disabled output style */
    #outputAmount {
      background-color: #f0f0f0;
      color: #555;
      cursor: not-allowed;
      font-size: 1.1rem;
    }
    button {
      background-color: #cc3300;
      color: white;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 0.75rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.3s ease;
    }
    button:hover,
    button:focus {
      background-color: #ff6600;
      outline: none;
    }
    footer {
      background-color: rgba(255, 255, 255, 0.9);
      text-align: center;
      padding: 1rem;
      font-weight: 600;
      color: #cc3300;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.15);
    }
    /* Responsive */
    @media (max-width: 480px) {
      .currency-selector {
        flex-direction: column;
        gap: 1rem;
      }
      .currency-label {
        width: 100%;
        flex-direction: row;
        justify-content: flex-start;
        gap: 1rem;
        position: relative;
      }
      .currency-label svg {
        width: 36px;
        height: 36px;
      }
      /* Hide lines on mobile */
      .currency-label::before,
      .currency-label::after {
        display: none;
      }
    
  </style>
</head>
<body>
  <header>
    <!-- Date and daily Euro price notice -->
    <p id="dateNotice" aria-live="polite"></p>
    <p>Precio del Euro al día: <strong id="euroPrice">--</strong> Bs.</p>
  </header>

  <main>
    <form id="converterForm" aria-label="Formulario para convertir Euro a Bolívares y viceversa">
      <!-- Currency direction selector -->
      <fieldset class="currency-selector" role="radiogroup" aria-labelledby="conversionDirectionLabel">
        <legend id="conversionDirectionLabel" class="visually-hidden">Seleccionar tipo de conversión</legend>

        <input type="radio" id="euroToBs" name="conversionDirection" value="euroToBs" checked />
        <label class="currency-label" for="euroToBs" tabindex="0">
          <!-- Euro SVG Icon -->
          <svg aria-hidden="true" focusable="false" viewBox="0 0 64 64" fill="#003399" xmlns="http://www.w3.org/2000/svg">
            <circle cx="32" cy="32" r="30" stroke="#003399" stroke-width="4" fill="#0052cc"/>
            <path d="M40 20H24a12 12 0 0 0 0 24h16" stroke="#fff" stroke-width="4" stroke-linecap="round" fill="none"/>
            <line x1="24" y1="28" x2="40" y2="28" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
            <line x1="24" y1="36" x2="40" y2="36" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          </svg>
          <span>Euro → Bs.</span>
        </label>

        <input type="radio" id="bsToEuro" name="conversionDirection" value="bsToEuro" />
        <label class="currency-label" for="bsToEuro" tabindex="0">
          <!-- Bolívares SVG Icon (stylized Bs symbol in yellow/orange) -->
          <svg aria-hidden="true" focusable="false" viewBox="0 0 64 64" fill="#ff6600" xmlns="http://www.w3.org/2000/svg">
            <circle cx="32" cy="32" r="30" stroke="#cc3300" stroke-width="4" fill="#ff9933"/>
            <path d="M24 20h16a8 8 0 0 1 0 16h-16" stroke="#cc3300" stroke-width="4" stroke-linecap="round" fill="none"/>
            <line x1="24" y1="28" x2="40" y2="28" stroke="#cc3300" stroke-width="4" stroke-linecap="round"/>
            <line x1="24" y1="36" x2="40" y2="36" stroke="#cc3300" stroke-width="4" stroke-linecap="round"/>
          </svg>
          <span>Bs. → Euro</span>
        </label>
      </fieldset>

      <div class="inputs-group">
        <div>
          <label for="inputAmount">Ingrese el monto:</label>
          <input 
            type="number" 
            id="inputAmount" 
            name="inputAmount" 
            min="0" 
            step="0.01" 
            placeholder="0.00" 
            aria-describedby="inputAmountHelp"
            required 
            autocomplete="off" 
            inputmode="decimal" />
          <small id="inputAmountHelp" class="visually-hidden">Ingrese el monto a convertir, solo números positivos.</small>
        </div>

        <div>
          <label for="outputAmount">Monto convertido:</label>
          <input 
            type="text" 
            id="outputAmount" 
            name="outputAmount" 
            readonly 
            aria-live="polite" 
            placeholder="Resultado"
            tabindex="-1" />
        </div>
      </div>

      <button type="submit" id="sendWhatsAppBtn" aria-label="Enviar resultado convertido por WhatsApp">
        Enviar a WhatsApp
      </button>
    </form>
  </main>
  
  
  
  
  
  
  


  <footer>
    &copy; 2026 EstamosFrito.com
  </footer>

  <script>
    // Constants
    const euroPriceElement = document.getElementById('euroPrice');
    const dateNoticeElement = document.getElementById('dateNotice');
    const inputAmount = document.getElementById('inputAmount');
    const outputAmount = document.getElementById('outputAmount');
    const form = document.getElementById('converterForm');

    // Example: Precio del euro al día (could be replaced by API fetch)
    // For demo, a fixed price is set. You can update this dynamically.
    const euroPriceToday = 568.51; // Bs. per Euro

    // Set today's date in formato dd/mm/yyyy
    function setDateNotice() {
      const today = new Date();
      const day = String(today.getDate()).padStart(2, '0');
      const month = String(today.getMonth() + 1).padStart(2, '0'); // Months are zero based
      const year = today.getFullYear();
      dateNoticeElement.textContent = `Fecha actual: ${day} ${month} ${year}`;
    }

    // Update euro price display
    function displayEuroPrice() {
      euroPriceElement.textContent = euroPriceToday.toLocaleString('es-VE');
    }

    // Calculate conversion based on selected direction and input amount
    function convertCurrency(amount, direction) {
      if (direction === 'euroToBs') {
        return amount * euroPriceToday;
      } else {
        return amount / euroPriceToday;
      }
    }

    // Format output number with decimals and thousands separators
    function formatNumber(num, decimals = 2) {
      return num.toLocaleString('es-VE', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
    }

    // Update output amount on input or direction change
    function updateConversion() {
      const amount = parseFloat(inputAmount.value);
      const direction = form.conversionDirection.value;

      if (!isNaN(amount) && amount >= 0) {
        const converted = convertCurrency(amount, direction);
        const decimals = direction === 'bsToEuro' ? 5 : 0; // More decimals when converting Bs to Euro
        outputAmount.value = formatNumber(converted, decimals);
      } else {
        outputAmount.value = '';
      }
    }

    // Prepare WhatsApp message text & open link
    function sendToWhatsApp(text) {
      // WhatsApp API URL with encoded message
      const encodedText = encodeURIComponent(text);
      const whatsappUrl = `https://wa.me/?text=${encodedText}`;
      window.open(whatsappUrl, '_blank', 'noopener,noreferrer');
    }

    // Handle form submit event
    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const inputVal = inputAmount.value.trim();
      const direction = form.conversionDirection.value;

      if (inputVal === '' || isNaN(inputVal) || Number(inputVal) < 0) {
        alert('Por favor, ingrese un monto válido mayor o igual a cero.');
        inputAmount.focus();
        return;
      }

      const amountNumber = Number(inputVal);
      const converted = convertCurrency(amountNumber, direction);
      const decimals = direction === 'bsToEuro' ? 5 : 0;

      const formattedInput = formatNumber(amountNumber, 3);
      const formattedOutput = formatNumber(converted, decimals);

      // Prepare message text for WhatsApp
      let message = `Hola! Aquí está la conversión realizada en EstamosFrito.com:\n\n`;
      if (direction === 'euroToBs') {
        message += `€ ${formattedInput} =Bs ${formattedOutput}\n`;
      } else {
        message += `Bs. ${formattedInput} = € ${formattedOutput}\n`;
      }
      message += `Precio del Euro al día: Bs. ${euroPriceToday.toLocaleString('es-VE')}\n`;
      const today = new Date();
      message += `Fecha: ${today.toLocaleDateString('es-VE')}\n\n¡Gracias por usar nuestro convertidor!`;

      sendToWhatsApp(message);
    });

    // Update output on input and radio change
    inputAmount.addEventListener('input', updateConversion);
    form.conversionDirection.forEach(radio => radio.addEventListener('change', () => {
      // Clear input and output on direction change for clarity
      inputAmount.value = '';
      outputAmount.value = '';
      inputAmount.focus();
    }));

    // Helper: visually hidden class for accessibility
    const style = document.createElement('style');
    style.textContent = `.visually-hidden { 
      position: absolute !important; 
      height: 1px; width: 1px; 
      overflow: hidden; 
      clip: rect(1px, 1px, 1px, 1px); 
      white-space: nowrap; 
      }`;
    document.head.appendChild(style);

    // Initialize page content
    setDateNotice();
    displayEuroPrice();
    
    
    
    
    
     // Esperar a que el DOM esté cargado
    document.addEventListener('DOMContentLoaded', () => {
      const banner = document.getElementById('banner-aviso');
      const closeBtn = document.getElementById('banner-close');

      // Mostrar el banner (en caso que esté oculto por defecto)
      banner.style.display = 'flex';

      // Función para cerrar el banner
      const cerrarBanner = () => {
        banner.style.display = 'none';
      };

      closeBtn.addEventListener('click', cerrarBanner);

      // Opcional: permitir cerrar con tecla ESC
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && banner.style.display !== 'none') {
          cerrarBanner();
        }
      });
    });
  </script>
</body>
</html>
